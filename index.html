<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Saku P3K</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e7f4f, #3bb273);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 90%;
      max-width: 380px;
      background: white;
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    h1 {
      color: #1e7f4f;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    .input-box {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      font-size: 13px;
      color: #555;
      margin-bottom: 5px;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #3bb273;
      box-shadow: 0 0 5px rgba(59,178,115,0.5);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #1e7f4f, #3bb273);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon"></div>
    <h1>Saku P3K</h1>
    <p class="subtitle">Aplikasi belajar pertolongan pertama</p>

    <div class="input-box">
      <label>Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Masukkan nama kamu">
    </div>

    <button class="btn" onclick="masuk()">Masuk Sekarang </button>

    <div class="footer">
      PGSD Project • 2026
    </div>
  </div>

  <script>
    function masuk() {
      const nama = document.getElementById("nama").value;

      if (nama.trim() === "") {
        alert("Nama tidak boleh kosong!");
        return;
      }

      localStorage.setItem("namaUser", nama);

      // efek pindah halus
      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = "menu.html";
      }, 300);
    }
  </script>

</body>
</html>
